<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#5a7a64"/>
    </marker>
    <marker id="arrow-white" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#ffffff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="720" fill="#faf9f6" rx="8"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="EB Garamond, serif" font-size="22" font-weight="600" fill="#243833">Research Program Architecture</text>

  <!-- CULTURAL / REPRESENTATIONAL -->
  <rect x="200" y="55" width="400" height="60" fill="#243833" rx="6" stroke="#243833" stroke-width="2"/>
  <text x="400" y="78" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff" letter-spacing="0.05em">CULTURAL / REPRESENTATIONAL</text>
  <text x="400" y="96" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.85">(encodes, enforces, naturalizes)</text>
  <text x="400" y="110" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">Spans ALL levels simultaneously</text>

  <!-- Arrow: Cultural → Ecological -->
  <line x1="400" y1="115" x2="400" y2="145" stroke="#5a7a64" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- V. ECOLOGICAL -->
  <rect x="200" y="150" width="400" height="70" fill="#243833" rx="6" stroke="#243833" stroke-width="2"/>
  <text x="400" y="175" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff" letter-spacing="0.05em">V. ECOLOGICAL</text>
  <text x="400" y="193" text-anchor="middle" font-size="11" fill="#ffffff" opacity="0.9">How do all levels interact as a dynamic system?</text>
  <text x="400" y="208" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">Integrates environmental input → regulatory load</text>

  <!-- Arrow: Ecological → feedback split -->
  <line x1="400" y1="220" x2="400" y2="245" stroke="#5a7a64" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="240" text-anchor="middle" font-size="10" fill="#5a7a64" font-weight="500">feedback</text>

  <!-- Feedback arrows to I and II -->
  <path d="M 400 250 L 400 265 L 160 265 L 160 280" fill="none" stroke="#5a7a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 400 250 L 400 265 L 640 265 L 640 280" fill="none" stroke="#5a7a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Center arrow down -->
  <line x1="400" y1="250" x2="400" y2="340" stroke="#5a7a64" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- I. ARCHITECTURAL -->
  <rect x="40" y="285" width="240" height="75" fill="#faf9f6" rx="6" stroke="#243833" stroke-width="2"/>
  <text x="160" y="308" text-anchor="middle" font-size="13" font-weight="600" fill="#243833" letter-spacing="0.05em">I. ARCHITECTURAL</text>
  <text x="160" y="326" text-anchor="middle" font-size="11" fill="#243833">What are the two architectures?</text>
  <text x="160" y="348" text-anchor="middle" font-size="9" fill="#6e6e73">Socially coupled vs. internally mediated</text>

  <!-- II. COMPUTATIONAL -->
  <rect x="520" y="285" width="240" height="75" fill="#faf9f6" rx="6" stroke="#243833" stroke-width="2"/>
  <text x="640" y="308" text-anchor="middle" font-size="13" font-weight="600" fill="#243833" letter-spacing="0.05em">II. COMPUTATIONAL</text>
  <text x="640" y="326" text-anchor="middle" font-size="11" fill="#243833">How do energetic constraints shape inference?</text>
  <text x="640" y="348" text-anchor="middle" font-size="9" fill="#6e6e73">Metabolic gating · precision dynamics</text>

  <!-- Bidirectional: I ↔ II -->
  <line x1="285" y1="310" x2="515" y2="310" stroke="#5a7a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="515" y1="325" x2="285" y2="325" stroke="#5a7a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="308" text-anchor="middle" font-size="10" fill="#5a7a64" font-style="italic">formalizes</text>
  <text x="400" y="335" text-anchor="middle" font-size="10" fill="#5a7a64" font-style="italic">identifies</text>

  <!-- Arrow: I → III -->
  <line x1="160" y1="360" x2="160" y2="410" stroke="#5a7a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="130" y="390" text-anchor="end" font-size="10" fill="#5a7a64" font-style="italic">feeds into</text>

  <!-- Arrow: II → IV -->
  <line x1="640" y1="360" x2="640" y2="410" stroke="#5a7a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="670" y="390" text-anchor="start" font-size="10" fill="#5a7a64" font-style="italic">explains</text>

  <!-- Center labels -->
  <text x="400" y="360" text-anchor="middle" font-size="10" fill="#5a7a64" font-style="italic">grounds in</text>

  <!-- III. EXPERIENTIAL -->
  <rect x="40" y="415" width="240" height="75" fill="#faf9f6" rx="6" stroke="#243833" stroke-width="2"/>
  <text x="160" y="438" text-anchor="middle" font-size="13" font-weight="600" fill="#243833" letter-spacing="0.05em">III. EXPERIENTIAL</text>
  <text x="160" y="456" text-anchor="middle" font-size="11" fill="#243833">What does sustained mismatch cost?</text>
  <text x="160" y="478" text-anchor="middle" font-size="9" fill="#6e6e73">Masking · burnout · structural insolvency</text>

  <!-- IV. MECHANISTIC -->
  <rect x="520" y="415" width="240" height="75" fill="#faf9f6" rx="6" stroke="#243833" stroke-width="2"/>
  <text x="640" y="438" text-anchor="middle" font-size="13" font-weight="600" fill="#243833" letter-spacing="0.05em">IV. MECHANISTIC</text>
  <text x="640" y="456" text-anchor="middle" font-size="11" fill="#243833">What is the specific biological pathway?</text>
  <text x="640" y="478" text-anchor="middle" font-size="9" fill="#6e6e73">Functional Iron Blockade · neuroimmune</text>

  <!-- Bidirectional: III ↔ IV -->
  <line x1="285" y1="445" x2="515" y2="445" stroke="#5a7a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="515" y1="460" x2="285" y2="460" stroke="#5a7a64" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="442" text-anchor="middle" font-size="10" fill="#5a7a64" font-style="italic">biological basis</text>
  <text x="400" y="472" text-anchor="middle" font-size="9" fill="#5a7a64" font-style="italic">validates cost of lived experience</text>

  <!-- Legend -->
  <line x1="250" y1="540" x2="310" y2="540" stroke="#5a7a64" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="320" y="544" font-size="11" fill="#6e6e73">Forward progression</text>

  <line x1="480" y1="540" x2="540" y2="540" stroke="#5a7a64" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="550" y="544" font-size="11" fill="#6e6e73">Feedback loop</text>

</svg>
