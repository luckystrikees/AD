<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Autistic Scholars</title>
    <meta name="description" content="Secure portal access for Autistic Scholars affiliated researchers and collaborators.">

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="Log In | Autistic Scholars">
    <meta property="og:description" content="Secure portal access for Autistic Scholars affiliated researchers.">
    <meta property="og:image" content="https://autisticscholars.org/assets/images/emblem.png">
    <meta property="og:url" content="https://autisticscholars.org/login.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://autisticscholars.org/login.html">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/favicon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/styles.css">

    <style>
        main {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }

        .hero {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url("assets/images/books.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 60px 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px 40px;
            background: #ffffff;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border-radius: 20px;
            text-align: center;
        }

        .login-emblem {
            width: 90px;
            display: block;
            margin: 0 auto 20px auto;
            opacity: 0.7;
        }

        .login-title {
            font-family: 'EB Garamond', serif;
            font-size: 1.6rem;
            color: var(--accent);
            margin: 0 0 25px 0;
        }

        .login-form input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            background: #fcfcfc;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
        }

        .login-submit {
            display: block;
            width: 100%;
            padding: 16px 0;
            margin-top: 5px;
            background-color: var(--accent);
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.8rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .login-utility {
            margin-top: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #888;
        }
    </style>
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="site-header">
        <div class="nav-inner">
            <div class="site-title">Autistic Scholars</div>

            <nav class="site-nav" aria-label="Primary Navigation">
                <a href="index.html">Home</a>
                <span class="nav-divider">·</span>
                <a href="research/index.html">Research Program</a>
                <span class="nav-divider">·</span>
                <a href="login.html">Research Portfolio</a>
                <span class="nav-divider">·</span>
                <a href="login.html">Working Papers</a>
                <span class="nav-divider">·</span>
                <a href="about.html">About</a>
            </nav>
        </div>
        <hr class="nav-rule">
    </header>

    <main id="main-content">
        <section class="hero">
            <div class="login-container">
                <img src="assets/images/emblem.png" alt="Emblem" class="login-emblem">
                <h2 class="login-title">Secure Portal</h2>
                <form class="login-form" action="login" method="POST">
                    <label for="username" class="sr-only">Scholar ID</label>
                    <input type="text" id="username" name="username" autocomplete="username" placeholder="SCHOLAR ID" required>
                    <label for="password" class="sr-only">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="PASSWORD" required>
                    <button type="submit" class="login-submit">Authenticate</button>
                </form>
                <div class="login-utility">
                    <a href="#">Forgot ID?</a> <span>•</span> <a href="#">Request Access</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-name">Autistic Scholars</div>
            <div class="footer-descriptor">An Independent Research Organization</div>
            <div class="footer-copyright">© 2026 Autistic Scholars</div>
        </div>
    </footer>

</body>
</html>
