<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Autistic Scholars</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/assets/css/styles.css">

    <style>
        .login-container {
            max-width: 420px;
            margin: 80px auto;
            padding: 60px 50px;
            background: #ffffff;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05) !important;
            border-radius: 20px !important;
            text-align: center;
        }
    
        .login-title {
            font-family: 'EB Garamond', serif;
            font-size: 1.8rem;
            color: var(--accent);
            margin: 20px 0 40px 0;
            letter-spacing: 0.02em;
        }
    
        .login-form input {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border) !important;
            background: #fcfcfc !important;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }
    
        .login-submit {
            display: block;
            width: 100%;
            padding: 18px 0;
            background-color: var(--accent) !important;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.8rem;
            font-weight: 600;
            border: none !important;
            cursor: pointer;
            transition: opacity 0.2s;
        }
    
        .login-submit:hover {
            opacity: 0.9;
        }
    
        .login-utility {
            margin-top: 30px;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #888;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="site-title">Autistic Scholars</div>
        <nav class="site-nav">
            <a href="/index.html">Home</a>
            <span class="nav-divider">·</span>
            <a href="/framework/index.html">Framework</a>
            <span class="nav-divider">·</span>
            <a href="/login.html">Research</a>
        </nav>
        <hr class="nav-rule">
    </header>

    <main>
        <div class="login-container">
            <!-- Strategic Institutional Emblem -->
            <img src="assets/images/emblem.png" alt="Emblem" style="width: 50px; opacity: 0.7;">
            
            <h2 class="login-title">Secure Portal</h2>

            <form class="login-form" action="/login" method="POST">
                <!-- Removed labels for a cleaner, high-end portal aesthetic -->
                <input type="text" name="username" placeholder="SCHOLAR ID" required>
                <input type="password" name="password" placeholder="PASSWORD" required>
                
                <button type="submit" class="login-submit">Authenticate</button>
            </form>

            <div class="login-utility">
                <a href="#">Forgot ID?</a> 
                <span>&nbsp;•&nbsp;</span> 
                <a href="#">Request Access</a>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-name">Autistic Scholars</div>
            <div class="footer-descriptor">An Independent Research Initiative</div>
            <div class="footer-copyright">© 2026</div>
        </div>
    </footer>

</body>
</html>
